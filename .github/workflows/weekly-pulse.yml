name: Weekly Pulse

on:
  schedule:
    # 07:00 IST = 01:30 UTC
    - cron: '30 1 * * 1'
  workflow_dispatch:

jobs:
  run_pipeline:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        product: [groww]
      fail-fast: false
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Run Pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PULSE_ENV: production
          AUTO_APPROVE: "true"
          MCP_SERVER_URL: ${{ secrets.MCP_SERVER_URL }}
        run: uv run pulse run --product ${{ matrix.product }} --weeks 12 --publish-target both
